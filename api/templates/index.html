<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
    header { background: #2563eb; color: white; padding: 1.2rem 2rem; }
    header h1 { font-size: 1.6rem; }
    header p  { font-size: 0.85rem; opacity: 0.8; }
    .container { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

    /* Form */
    .card { background: white; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .card h2 { margin-bottom: 1rem; font-size: 1.1rem; color: #2563eb; }
    .form-row { display: flex; gap: .8rem; flex-wrap: wrap; }
    input[type=text], textarea, select {
      border: 1px solid #d1d5db; border-radius: 6px; padding: .5rem .8rem;
      font-size: .95rem; outline: none; transition: border .2s;
    }
    input[type=text]:focus, textarea:focus, select:focus { border-color: #2563eb; }
    #task-title { flex: 1; min-width: 180px; }
    #task-desc  { flex: 2; min-width: 200px; }
    select      { width: 120px; }
    button {
      padding: .5rem 1.2rem; border: none; border-radius: 6px; cursor: pointer;
      font-size: .95rem; transition: background .2s;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-done    { background: #16a34a; color: white; font-size: .8rem; padding: .35rem .8rem; }
    .btn-done:hover { background: #15803d; }
    .btn-delete  { background: #dc2626; color: white; font-size: .8rem; padding: .35rem .8rem; }
    .btn-delete:hover { background: #b91c1c; }
    .btn-edit    { background: #d97706; color: white; font-size: .8rem; padding: .35rem .8rem; }
    .btn-edit:hover { background: #b45309; }

    /* Task list */
    #task-list { list-style: none; }
    #task-list li {
      background: white; border-radius: 8px; padding: 1rem 1.2rem;
      margin-bottom: .7rem; box-shadow: 0 1px 4px rgba(0,0,0,.07);
      display: flex; align-items: center; gap: .8rem; flex-wrap: wrap;
    }
    #task-list li.done { opacity: .55; }
    #task-list li.done .task-title { text-decoration: line-through; }
    .task-info   { flex: 1; min-width: 160px; }
    .task-title  { font-weight: 600; font-size: 1rem; }
    .task-desc   { font-size: .85rem; color: #555; margin-top: .2rem; }
    .task-meta   { font-size: .75rem; color: #9ca3af; margin-top: .2rem; }
    .task-actions { display: flex; gap: .4rem; }
    .badge { display:inline-block; font-size: .72rem; padding: .2rem .6rem;
             border-radius: 999px; font-weight: 600; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-done    { background: #d1fae5; color: #065f46; }
    .empty-msg { text-align: center; color: #9ca3af; padding: 2rem; }

    /* Edit modal */
    #edit-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
                  z-index:100; align-items:center; justify-content:center; }
    #edit-modal.open { display:flex; }
    #edit-box { background:white; border-radius:10px; padding:1.5rem; width:420px;
                max-width:95vw; box-shadow: 0 8px 30px rgba(0,0,0,.2); }
    #edit-box h3 { margin-bottom:1rem; color:#2563eb; }
    #edit-box input, #edit-box textarea, #edit-box select { width:100%; margin-bottom:.7rem; }
    #edit-box textarea { height:80px; resize:vertical; }
    .modal-actions { display:flex; gap:.6rem; justify-content:flex-end; }
    .btn-cancel { background:#e5e7eb; color:#333; }
    .btn-cancel:hover { background:#d1d5db; }
  </style>
</head>
<body>

<header>
  <h1>📋 Task Manager</h1>
  <p>Gestión de tareas con CRUD — Docker → Kubernetes</p>
</header>

<div class="container">

  <!-- Add task -->
  <div class="card">
    <h2>➕ Nueva tarea</h2>
    <div class="form-row">
      <input type="text" id="task-title" placeholder="Título *" maxlength="120">
      <input type="text" id="task-desc"  placeholder="Descripción (opcional)">
      <select id="task-status">
        <option value="pending">Pendiente</option>
        <option value="done">Hecha</option>
      </select>
      <button class="btn-primary" onclick="createTask()">Añadir</button>
    </div>
  </div>

  <!-- Task list -->
  <div class="card">
    <h2>📝 Tareas <span id="task-count" style="font-weight:400;font-size:.9rem;color:#6b7280"></span></h2>
    <ul id="task-list"><li class="empty-msg">Cargando...</li></ul>
  </div>

</div>

<!-- Edit modal -->
<div id="edit-modal">
  <div id="edit-box">
    <h3>✏️ Editar tarea</h3>
    <input type="hidden" id="edit-id">
    <input type="text"   id="edit-title" placeholder="Título">
    <textarea            id="edit-desc"  placeholder="Descripción"></textarea>
    <select              id="edit-status">
      <option value="pending">Pendiente</option>
      <option value="done">Hecha</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancelar</button>
      <button class="btn-primary" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<script>
  const api = '/api/tasks';

  async function loadTasks() {
    const res = await fetch(api);
    const data = await res.json();
    const list = document.getElementById('task-list');
    const tasks = data.tasks;
    document.getElementById('task-count').textContent =
      tasks.length ? `(${tasks.length})` : '';
    if (!tasks.length) {
      list.innerHTML = '<li class="empty-msg">No hay tareas. ¡Crea la primera!</li>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <li class="${t.status}">
        <div class="task-info">
          <div class="task-title">${esc(t.title)}</div>
          ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
          <div class="task-meta">#${t.id} · ${new Date(t.created_at).toLocaleString('es-ES')}</div>
        </div>
        <span class="badge badge-${t.status}">${t.status === 'done' ? '✅ Hecha' : '⏳ Pendiente'}</span>
        <div class="task-actions">
          ${t.status === 'pending'
            ? `<button class="btn-done"   onclick="toggleDone(${t.id}, 'done')">Completar</button>`
            : `<button class="btn-edit"   onclick="toggleDone(${t.id}, 'pending')">Reabrir</button>`}
          <button class="btn-edit"   onclick="openEdit(${t.id},'${esc(t.title)}','${esc(t.description||'')}','${t.status}')">Editar</button>
          <button class="btn-delete" onclick="deleteTask(${t.id})">Borrar</button>
        </div>
      </li>`).join('');
  }

  async function createTask() {
    const title  = document.getElementById('task-title').value.trim();
    const desc   = document.getElementById('task-desc').value.trim();
    const status = document.getElementById('task-status').value;
    if (!title) { alert('El título es obligatorio'); return; }
    await fetch(api, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({title, description: desc, status})
    });
    document.getElementById('task-title').value = '';
    document.getElementById('task-desc').value  = '';
    document.getElementById('task-status').value = 'pending';
    loadTasks();
  }

  async function toggleDone(id, status) {
    await fetch(`${api}/${id}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({status})
    });
    loadTasks();
  }

  async function deleteTask(id) {
    if (!confirm('¿Borrar esta tarea?')) return;
    await fetch(`${api}/${id}`, {method: 'DELETE'});
    loadTasks();
  }

  function openEdit(id, title, desc, status) {
    document.getElementById('edit-id').value     = id;
    document.getElementById('edit-title').value  = title;
    document.getElementById('edit-desc').value   = desc;
    document.getElementById('edit-status').value = status;
    document.getElementById('edit-modal').classList.add('open');
  }
  function closeEdit() {
    document.getElementById('edit-modal').classList.remove('open');
  }
  async function saveEdit() {
    const id     = document.getElementById('edit-id').value;
    const title  = document.getElementById('edit-title').value.trim();
    const desc   = document.getElementById('edit-desc').value.trim();
    const status = document.getElementById('edit-status').value;
    if (!title) { alert('El título no puede estar vacío'); return; }
    await fetch(`${api}/${id}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({title, description: desc, status})
    });
    closeEdit(); loadTasks();
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadTasks();
  setInterval(loadTasks, 10000);
</script>
</body>
</html>
